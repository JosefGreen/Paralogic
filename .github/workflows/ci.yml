name: Lean CI

on:
  push:
  pull_request:

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean
        uses: leanprover/elan-action@v1
        with:
          version: leanprover/lean4:v4.19.0
      - name: Build Lean project
        run: lake build

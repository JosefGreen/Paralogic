name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false
          use-mathlib-cache: false

      - name: Check for active Lean holes
        run: |
          if grep -RInE '\b(sorry|admit|unsafe|axiom)\b' src --include='*.lean'; then
            echo "Active Lean hole or unsound declaration marker found."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test runner
        run: python -m pip install --upgrade pytest

      - name: Run Python regression tests
        run: python -m pytest -q

      - name: Run finite model checker
        run: python python/finite_check.py

      - name: Run proof checker
        run: python python/proof_check.py

      - name: Run propositional proof checker
        run: python python/propositional_proof_check.py

      - name: Run evidence granularity checker
        run: python python/granularity_check.py

      - name: Run delta dynamics checker
        run: python python/delta_check.py

      - name: Run repair revision checker
        run: python python/repair_revision_check.py

      - name: Run evaluator calibration checker
        run: python python/evaluator_calibration_check.py

      - name: Run warrant coverage checker
        run: python python/warrant_coverage_check.py

      - name: Run mechanism coverage checker
        run: python python/mechanism_coverage_check.py

      - name: Run M2 metric proxy checker
        run: python python/metric_proxy_check.py

      - name: Run M1 evidence overclaim checker
        run: python python/evidence_overclaim_check.py

      - name: Run M3 formal access checker
        run: python python/formal_access_check.py

      - name: Run M4 symbolic substitution checker
        run: python python/symbolic_substitution_check.py

      - name: Run M5 repair failure checker
        run: python python/repair_failure_check.py

      - name: Run M6 translation failure checker
        run: python python/translation_failure_check.py

      - name: Run M9 veto suppression checker
        run: python python/veto_suppression_check.py

      - name: Run M10 frame drift checker
        run: python python/frame_drift_check.py

      - name: Run M11 symbolic overload checker
        run: python python/symbolic_overload_check.py
